<div class="max-w-2xl mx-auto p-4">
    <div *ngIf="loading" class="text-center py-4 text-gray-500">
        {{ 'LoadingPosts' | localize }}
    </div>
    <div *ngIf="!loading && !publication" class="text-center py-4 text-gray-500">
        {{ 'NoPostsFound' | localize }}
    </div>
    <div *ngIf="!loading && publication">
        <app-publication 
            [publication]="publication"
            (like)="handleLike()"
            (comment)="handleComment()">
        </app-publication>

        <!-- Comments section -->
        <div class="border-t border-gray-700 mt-4 pt-4">
            <h3 class="text-lg font-semibold mb-3">
                {{ 'Comments' | localize }} ({{ publication.commentCount || 0 }})
            </h3>
            <publications-container 
                *ngIf="publication.id"
                [parentId]="publication.id">
            </publications-container>
        </div>
    </div>
</div>

<!-- Add Comment Dialog -->
<p-dialog
    header="{{ 'AddComment' | localize }}"
    [(visible)]="showCommentDialog"
    [modal]="true"
    [closable]="false"
    [style]="{ width: '80vw', maxWidth: '400px' }"
    (onHide)="cancelComment()"
>
    <form
        #form="ngForm"
        (ngSubmit)="submitComment(form)"
        (paste)="onPaste($event)"
        novalidate
        class="space-y-4"
    >
        <div>
        <textarea
            id="commentContent"
            name="commentContent"
            required
            rows="4"
            [(ngModel)]="commentContent"
            #contentCtrl="ngModel"
            [placeholder]="'WriteAComment' | localize"
            class="w-full p-2 border border-gray-300 rounded-md bg-gray-800 text-white placeholder-gray-400 focus:outline-none resize-y"
        ></textarea>
        <small *ngIf="contentCtrl.invalid && contentCtrl.touched" class="text-red-500">
            {{ 'CommentTextIsRequired' | localize }}
        </small>
        </div>

        <!-- File previews -->
        <div *ngIf="commentPreviews.length > 0" class="space-y-2">
            <div *ngFor="let preview of commentPreviews; let i = index" class="relative">
                <img
                    *ngIf="!preview.isVideo"
                    [src]="preview.url"
                    [alt]="'Preview' | localize"
                    class="w-full rounded-lg border border-gray-600"
                />
                <video
                    *ngIf="preview.isVideo"
                    [src]="preview.url"
                    controls
                    class="w-full rounded-lg border border-gray-600"
                ></video>
                <button
                    type="button"
                    pButton
                    icon="pi pi-times"
                    class="absolute top-2 right-2 p-2 bg-red-600 hover:bg-red-700 text-white rounded-full"
                    (click)="removeCommentFile(i)"
                ></button>
            </div>
        </div>

        <div class="text-center space-y-2">
        <input
            #fileInput
            type="file"
            accept="image/*,video/*"
            multiple
            (change)="onFileChange($event)"
            hidden
        />
        <button
            type="button"
            pButton
            icon="pi pi-upload"
            label="{{ 'AttachImage' | localize }}"
            (click)="fileInput.click()"
            [disabled]="commentPreviews.length >= 5"
            class="inline-flex items-center justify-center px-4 py-2 btn-primary rounded-md"
        ></button>
        <div class="text-sm text-gray-400">
            {{ 'OrPasteAnImage' | localize }}
        </div>
        <div *ngIf="commentPreviews.length > 0" class="text-sm text-gray-400">
            {{ commentPreviews.length }} / 5
        </div>
        </div>

        <p-message
        *ngIf="commentError"
        severity="error"
        [text]="commentError"
        class="block"
        ></p-message>

        <div class="flex justify-end space-x-3">
        <button
            pButton
            type="button"
            label="{{ 'Cancel' | localize }}"
            class="p-button-text text-white"
            (click)="cancelComment()"
        ></button>
        <button
            pButton
            type="submit"
            label="{{ 'Post' | localize }}"
            [disabled]="commentLoading || form.invalid"
            [loading]="commentLoading"
            class="btn-primary rounded-md px-4 py-2"
        ></button>
        </div>
    </form>
</p-dialog>
