<p-confirmDialog></p-confirmDialog>

<div
  class="shadow rounded-2xl p-4 flex flex-col gap-3 cursor-pointer hover:bg-gray-800/10"
  (click)="onView()"
>
    <div class="flex items-center justify-between" (click)="$event.stopPropagation()">
        <a
        [routerLink]="['/profile', publication.authorId]"
        class="flex items-center gap-3"
        >
        <img
            class="w-10 h-10 rounded-full object-cover"
            [src]="avatarSrc"
            [alt]="publication.authorName
            ? (publication.authorName + ' ' + ('UserLogo' | localize))
            : ('Unknown' | localize)"
        />
        <span class="font-semibold text-base">
            {{ publication.authorName || ('Unknown' | localize) }}
        </span>
        </a>

        <div *ngIf="menuItems && menuItems.length > 0">
            <button
                pButton
                type="button"
                icon="pi pi-ellipsis-v"
                class="btn-primary rounded-full p-2"
                (click)="menu.toggle($event)"
            ></button>
            <p-menu
                #menu
                [popup]="true"
                [model]="menuItems"
                appendTo="body"
            ></p-menu>
        </div>
    </div>

    <div *ngIf="publication.description" class="text-sm leading-relaxed">
        {{ publication.description }}
    </div>

    <div *ngIf="publication.fileUrls?.length" class="mt-2 space-y-2" (click)="$event.stopPropagation()">
        <ng-container *ngFor="let url of publication.fileUrls">
            <video
            *ngIf="isVideo(url)"
            [src]="url"
            controls
            class="w-full rounded-lg"
            ></video>
            <img
            *ngIf="!isVideo(url)"
            [src]="url"
            [alt]="'PublicationImage' | localize"
            class="w-full rounded-lg"
            />
        </ng-container>
    </div>

    <div class="flex items-center gap-6 mt-2">
        <button
        type="button"
        (click)="onLike(); $event.stopPropagation()"
        class="flex items-center gap-1 px-2 py-1 rounded-xl hover:bg-gray-800/50 transition"
        [ngClass]="{'text-primary': publication.isLikedByCurrentUser}"
        >
        <i class="pi" [ngClass]="publication.isLikedByCurrentUser ? 'pi-thumbs-up-fill' : 'pi-thumbs-up'"></i>
        <span>{{ 'Like' | localize }} {{ publication.likeCount || 0 }}</span>
        </button>
        <button
        type="button"
        (click)="onComment(); $event.stopPropagation()"
        class="flex items-center gap-1 px-2 py-1 rounded-xl hover:bg-gray-800/50 transition"
        >
        <i class="pi pi-comments"></i>
        <span>{{ 'Comment' | localize }} {{ publication.commentCount || 0 }}</span>
        </button>
    </div>
</div>
