<div class="layout">
    <aside class="sidebar flex flex-col h-screen">
        <p-panel-menu [model]="sideItems" styleClass="sidebar-menu"></p-panel-menu>

        <div class="sidebar-footer p-4 space-y-4">
        <select
            [(ngModel)]="currentLanguage"
            (ngModelChange)="switchLanguage($event)"
            class="w-full bg-gray-700 text-white rounded px-3 py-2 text-lg"
        >
            <option *ngFor="let l of languages" [value]="l.code">
            {{ l.label }}
            </option>
        </select>

        <button
            pButton
            type="button"
            label="{{ 'Post' | localize }}"
            icon="pi pi-plus"
            class="w-full btn-primary rounded-md py-3 text-lg font-semibold"
            (click)="openPostModal()"
        ></button>

        <div
            class="flex items-center justify-between cursor-pointer p-3 hover:bg-gray-800 rounded-xl transition-colors"
            (click)="userMenu.toggle($event)"
        >
            <div class="flex items-center">
                <img
                    class="w-14 h-14 rounded-full object-cover"
                    [src]="getLogoSrc(userProfilePicture)"
                    alt="User logo"
                />
                <span class="ml-3 text-white font-semibold text-lg">{{ userName }}</span>
            </div>
            <i class="pi pi-ellipsis-v text-gray-400 mr-1 text-lg"></i>
        </div>
        </div>
    </aside>

    <main class="content">
        <router-outlet></router-outlet>
    </main>

    <p-menu #userMenu [popup]="true" [model]="userMenuItems"></p-menu>

    <p-dialog
        header="New Publication"
        [(visible)]="displayPostModal"
        [modal]="true"
        [closable]="false"
        [style]="{ width: '80vw', maxWidth: '600px' }"
        [contentStyle]="{
        padding: '1rem',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'stretch'
        }"
    >
        <app-create-or-edit-publication
        (saved)="onPostSaved($event)"
        (cancelled)="displayPostModal = false"
        ></app-create-or-edit-publication>
    </p-dialog>
</div>
